name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  quality:
    name: Lint, test, and build
    runs-on: ubuntu-latest

    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run typecheck

      - name: Run fast tests
        run: npm test

      - name: Start DynamoDB Local
        run: |
          docker run \
            --detach \
            --name dynamodb-local \
            --publish 8000:8000 \
            amazon/dynamodb-local:latest \
            -jar DynamoDBLocal.jar \
            -sharedDb \
            -inMemory

      - name: Wait for DynamoDB Local
        shell: bash
        run: |
          for attempt in {1..30}; do
            if curl --silent --output /dev/null http://localhost:8000; then
              echo "DynamoDB Local is accepting connections"
              exit 0
            fi

            echo "Waiting for DynamoDB Local (attempt $attempt/30)..."
            sleep 1
          done

          echo "DynamoDB Local did not become ready"
          docker logs dynamodb-local
          exit 1

      - name: Run DynamoDB integration tests
        run: npm run test:integration --workspace server
        env:
          AWS_REGION: us-east-1
          DYNAMODB_ENDPOINT: http://localhost:8000
          AWS_ACCESS_KEY_ID: local
          AWS_SECRET_ACCESS_KEY: local

      - name: Build
        run: npm run build

      - name: Build production Docker image
        run: docker build --tag todo-cicd:${{ github.sha }} .
  publish:
    name: Publish image to ECR
    needs: quality

    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Configure temporary AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::367396826304:role/TodoCicdEcrPublisher
          aws-region: us-east-1
          role-session-name: todo-cicd-${{ github.run_id }}

      - name: Show AWS identity
        run: aws sts get-caller-identity

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: todo-cicd
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI="${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"

          docker build \
            --platform linux/amd64 \
            --tag "${IMAGE_URI}" \
            .

          docker push "${IMAGE_URI}"

          echo "Published ${IMAGE_URI}"
