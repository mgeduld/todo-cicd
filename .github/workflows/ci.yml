name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  quality:
    name: Lint, test, and build
    runs-on: ubuntu-latest

    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run typecheck

      - name: Run fast tests
        run: npm test

      - name: Start DynamoDB Local
        run: |
          docker run \
            --detach \
            --name dynamodb-local \
            --publish 8000:8000 \
            amazon/dynamodb-local:latest \
            -jar DynamoDBLocal.jar \
            -sharedDb \
            -inMemory

      - name: Wait for DynamoDB Local
        run: |
          curl \
            --retry 10 \
            --retry-delay 1 \
            --retry-connrefused \
            http://localhost:8000

      - name: Run DynamoDB integration tests
        run: npm run test:integration --workspace server
        env:
          AWS_REGION: us-east-1
          DYNAMODB_ENDPOINT: http://localhost:8000
          AWS_ACCESS_KEY_ID: local
          AWS_SECRET_ACCESS_KEY: local

      - name: Build
        run: npm run build