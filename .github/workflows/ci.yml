name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  quality:
    name: Lint, test, and build
    runs-on: ubuntu-latest

    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run typecheck

      - name: Run fast tests
        run: npm test

      - name: Start DynamoDB Local
        run: |
          docker run \
            --detach \
            --name dynamodb-local \
            --publish 8000:8000 \
            amazon/dynamodb-local:latest \
            -jar DynamoDBLocal.jar \
            -sharedDb \
            -inMemory

      - name: Wait for DynamoDB Local
        shell: bash
        run: |
          for attempt in {1..30}; do
            if curl --silent --output /dev/null http://localhost:8000; then
              echo "DynamoDB Local is accepting connections"
              exit 0
            fi

            echo "Waiting for DynamoDB Local (attempt $attempt/30)..."
            sleep 1
          done

          echo "DynamoDB Local did not become ready"
          docker logs dynamodb-local
          exit 1

      - name: Run DynamoDB integration tests
        run: npm run test:integration --workspace server
        env:
          AWS_REGION: us-east-1
          DYNAMODB_ENDPOINT: http://localhost:8000
          AWS_ACCESS_KEY_ID: local
          AWS_SECRET_ACCESS_KEY: local

      - name: Build
        run: npm run build

      - name: Build production Docker image
        run: docker build --tag todo-cicd:${{ github.sha }} .
  publish:
    name: Publish image to ECR
    needs: quality

    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    runs-on: ubuntu-latest
    timeout-minutes: 15

    environment:
      name: production

    concurrency:
      group: todo-cicd-production
      cancel-in-progress: false

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Show GitHub OIDC claims
        shell: bash
        run: |
          RESPONSE="$(
            curl \
              --silent \
              --show-error \
              --fail \
              --header "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
              "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=sts.amazonaws.com"
          )"

          TOKEN="$(
            python3 -c '
          import json
          import sys

          print(json.load(sys.stdin)["value"])
          ' <<< "$RESPONSE"
          )"

          python3 - "$TOKEN" <<'PY'
          import base64
          import json
          import sys

          token = sys.argv[1]
          encoded_payload = token.split(".")[1]
          encoded_payload += "=" * (-len(encoded_payload) % 4)

          payload = json.loads(
              base64.urlsafe_b64decode(encoded_payload)
          )

          for claim in (
              "iss",
              "aud",
              "sub",
              "repository",
              "environment",
              "ref",
              "workflow",
          ):
              print(f"{claim}: {payload.get(claim)}")
          PY

      - name: Configure temporary AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::367396826304:role/TodoCicdEcrPublisher
          aws-region: us-east-1
          role-session-name: todo-cicd-${{ github.run_id }}

      - name: Show AWS identity
        run: aws sts get-caller-identity

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: todo-cicd
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI="${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"

          docker build \
            --platform linux/amd64 \
            --tag "${IMAGE_URI}" \
            .

          docker push "${IMAGE_URI}"

          echo "image-uri=${IMAGE_URI}" >> "$GITHUB_OUTPUT"
          echo "Published ${IMAGE_URI}"
      - name: Render ECS task definition
        id: render-task-definition
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: infra/ecs-task-definition.json
          container-name: todo-cicd
          image: ${{ steps.build-image.outputs.image-uri }}
      - name: Deploy ECS task definition
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-task-definition.outputs.task-definition }}
          service: todo-cicd
          cluster: todo-cicd
          wait-for-service-stability: true
      - name: Verify deployed application
        shell: bash
        run: |
          LOAD_BALANCER_DNS="$(
            aws elbv2 describe-load-balancers \
              --names todo-cicd \
              --region us-east-1 \
              --query 'LoadBalancers[0].DNSName' \
              --output text
          )"

          echo "Testing http://${LOAD_BALANCER_DNS}/health"

          for attempt in {1..20}; do
            if response="$(
              curl \
                --silent \
                --show-error \
                --fail \
                "http://${LOAD_BALANCER_DNS}/health"
            )"; then
              echo "Health response: ${response}"
              exit 0
            fi

            echo "Health check attempt ${attempt}/20 failed; retrying..."
            sleep 3
          done

          echo "Deployed application did not pass its health check"
          exit 1
